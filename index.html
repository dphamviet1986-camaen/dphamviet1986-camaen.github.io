<!DOCTYPE html>
<html lang="en">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;font-family:-apple-system,BlinkMacSystemFont,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;position:fixed}
#app{position:relative;width:100%;height:100%;display:flex;flex-direction:column}
header{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;background:rgba(255,255,255,0.04);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,0.06);z-index:10;flex-shrink:0;gap:6px}

#modeBar{display:flex;gap:4px;overflow-x:auto;flex:1;scrollbar-width:none;-ms-overflow-style:none;padding:2px 0}

#modeBar button{padding:4px 10px;border:1px solid rgba(255,255,255,0.15);border-radius:12px;background:transparent;color:rgba(255,255,255,0.5);font-size:10px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;-webkit-tap-highlight-color:transparent;flex-shrink:0}

#signInBtn:active{transform:scale(0.95)}#signInBtn.loading{opacity:0.5;pointer-events:none}
#userStatus{font-size:10px;color:#4FC3F7;display:none}
#shapeBar{display:flex;align-items:center;gap:3px;padding:3px 10px;background:rgba(255,255,255,0.02);border-bottom:1px solid rgba(255,255,255,0.04);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#shapeBar::-webkit-scrollbar{display:none}

#shapeBar button{padding:2px 8px;border:1px solid rgba(255,255,255,0.08);border-radius:8px;background:transparent;color:rgba(255,255,255,0.35);font-size:9px;cursor:pointer;transition:all .2s;white-space:nowrap;-webkit-tap-highlight-color:transparent;flex-shrink:0}

#permOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:16px;padding:24px}
#permOverlay p{color:rgba(255,255,255,0.7);font-size:14px;text-align:center;max-width:280px;line-height:1.5}
#permBtn{padding:14px 32px;border:none;border-radius:24px;background:#4FC3F7;color:#000;font-size:16px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .2s;touch-action:manipulation}
#permBtn:active{opacity:.7}

</style>

<body>
<div id="app">
  <header>
    <h1>Blow Away Your Sadness</h1>
    <div id="modeBar">
      <button data-mode="water" class="active">Water</button>

      <button data-mode="faces">Faces</button>

</div>
<div id="permOverlay">
  <p>Tap to enable gyroscope &mdash; tilting your device controls gravity flow</p>
  <button id="permBtn">Enable Gyroscope</button>
</div>
<div id="loading">Loading&hellip;</div>

<script>
;(function(){
'use strict'

const $ = id => document.getElementById(id)
const canvas = $('c'), ctx = canvas.getContext('2d')
const permOverlay = $('permOverlay'), permBtn = $('permBtn'), loading = $('loading')
const modeBtns = document.querySelectorAll('#modeBar button')
const shapeBtns = document.querySelectorAll('#shapeBar button')
const signInBtn = $('signInBtn'), userStatus = $('userStatus')
const pauseBtn = $('pauseBtn'), speedSlider = $('speedSlider'), speedVal = $('speedVal')
const micBtn = $('micBtn'), moodBtn = $('moodBtn'), moodPicker = $('moodPicker')
const moodBtns = document.querySelectorAll('#moodPicker button')
const feedbackBtn = $('feedbackBtn'), fbOverlay = $('fbOverlay')
const fbText = $('fbText'), fbSubmit = $('fbSubmit'), fbCancel = $('fbCancel')
const fbThanks = $('fbThanks'), wordCount = $('wordCount')

// --- Pi auth ---
let piUser = null, piAccessToken = null, piAuthed = false
async function initPi() {
  try { await Pi.init({ version: '2.0', sandbox: true }) } catch (_) { return }
  await doPiAuth()
}
async function doPiAuth() {
  if (piAuthed) return
  signInBtn.classList.add('loading'); signInBtn.textContent = 'Connecting...'
  try {
    const auth = await Pi.authenticate(['username'], () => {})
    piAccessToken = auth.accessToken
    const r = await (await fetch('/api/auth/verify', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ accessToken: piAccessToken }) })).json()
    if (r.valid) { piUser = r.user; piAuthed = true }
    if (!piAuthed) { piUser = { username: auth.user.username, uid: auth.user.uid }; piAuthed = true }
  } catch(_){}
  signInBtn.classList.remove('loading'); updatePiUI()
}
function updatePiUI() {
  if (piAuthed && piUser) { signInBtn.style.display='none'; userStatus.style.display='inline'; userStatus.textContent=`π ${piUser.username}` }
  else { signInBtn.style.display='inline'; signInBtn.textContent='π Sign In'; userStatus.style.display='none' }
}
signInBtn.addEventListener('click', doPiAuth)

// --- Matter.js ---
const engine = Matter.Engine.create(), world = engine.world
engine.gravity.x = 0; engine.gravity.y = 1; engine.gravity.scale = 0.001

// --- State ---
let mode = 'water', currentShape = 'box', particles = [], walls = [], W, H
let spawnCounter = 0, dpr = 1, isPaused = false, speedMul = 1
let isDrawing = false, drawPoints = []
let ripple = null
let micActive = false, breathLevel = 0
let audioCtx = null, analyser = null, micStream = null
let currentMood = 'calm'

// --- Particle config ---
const WATER_HUES = [195,200,205,210]
const EMOS_ANIMALS = ['🐱','🐶','🐰','🐻','🐼','🦊','🐸','🐵','🐔','🐷','🦁','🐮','🐨','🐙','🦋','🐝','🐧','🐥']
const EMOS_FACES = ['😊','😂','😍','🤔','😴','😎','🤩','😇','🥳','😏','🥰','😜','🤗','😺','🤭','🥺','😈','🤖','👻','💀']
const EMOS_HEARTS = ['❤️','💕','💗','💖','💘','💝','💜','💙','💚','💛','🧡','🤍','🩷','🩵']
const EMOS_STARS = ['⭐','🌟','✨','💫','🌟','⭐','✨','💫','⭐','🌟']
const CANDY_COLORS = ['#FF6B6B','#FFB347','#48C9B0','#5DADE2','#AF7AC5','#F1948A','#85C1E9','#82E0AA','#F7DC6F','#F0B27A']
const CANDY_STRIPES = ['#FFF','#FFD700','#FF69B4','#00CED1','#FF6347','#FFF','#FFD700','#FFF','#FF1493','#FFF']
const BUBBLE_COLORS = ['hsla(350,70%,75%,0.35)','hsla(200,60%,80%,0.35)','hsla(280,50%,75%,0.35)','hsla(120,50%,80%,0.35)','hsla(50,60%,80%,0.35)','hsla(330,60%,78%,0.35)','hsla(180,50%,82%,0.35)']

const MOODS = {
  calm: { hue: [190,210], sat: [60,80], lit: [55,70], bg: 'rgba(79,195,247,0.04)', label:'Calm' },
  energy: { hue: [5,25], sat: [75,95], lit: [50,65], bg: 'rgba(255,87,34,0.04)', label:'Energy' },
  joy: { hue: [35,50], sat: [80,100], lit: [55,70], bg: 'rgba(255,193,7,0.04)', label:'Joy' },
  nature: { hue: [110,140], sat: [55,75], lit: [45,60], bg: 'rgba(76,175,80,0.04)', label:'Nature' },
  twilight: { hue: [260,290], sat: [50,70], lit: [45,60], bg: 'rgba(156,39,176,0.04)', label:'Twilight' },
}

const PARTICLE_CFG = {
  water:{max:280,rate:1,batch:3,r:[4,8],phys:{restitution:0.02,friction:0.18,frictionAir:0.008,density:0.0012}},
  animals:{max:55,rate:4,batch:1,r:[14,24],phys:{restitution:0.3,friction:0.04,frictionAir:0.004,density:0.002}},
  faces:{max:60,rate:3,batch:1,r:[14,22],phys:{restitution:0.35,friction:0.04,frictionAir:0.005,density:0.002}},
  hearts:{max:80,rate:3,batch:1,r:[12,20],phys:{restitution:0.3,friction:0.05,frictionAir:0.006,density:0.0018}},
  snow:{max:200,rate:1,batch:2,r:[3,7],phys:{restitution:0.05,friction:0.1,frictionAir:0.03,density:0.0005}},
  candy:{max:120,rate:2,batch:2,r:[6,10],phys:{restitution:0.2,friction:0.12,frictionAir:0.008,density:0.0015}},
  bubbles:{max:100,rate:2,batch:2,r:[6,14],phys:{restitution:0.6,friction:0.02,frictionAir:0.002,density:0.0003}},
  stars:{max:70,rate:3,batch:1,r:[12,20],phys:{restitution:0.4,friction:0.03,frictionAir:0.005,density:0.002}},
}

// --- Shape builders ---
const SHAPES = {}
function seg(p1,p2,t,o){const m={x:(p1.x+p2.x)/2,y:(p1.y+p2.y)/2},l=Math.sqrt((p2.x-p1.x)**2+(p2.y-p1.y)**2),a=Math.atan2(p2.y-p1.y,p2.x-p1.x);return Matter.Bodies.rectangle(m.x,m.y,l+t,t,{...o,angle:a})}
function perimW(pts,t,o){const r=[];for(let i=0;i<pts.length-1;i++)r.push(seg(pts[i],pts[i+1],t,o));return r}
const O={isStatic:true,restitution:0.08,friction:0.5,label:'wall'}
SHAPES.box=(cx,cy,cw,ch,t)=>[Matter.Bodies.rectangle(cx,cy+ch/2,cw+t*2,t,O),Matter.Bodies.rectangle(cx-cw/2-t/2,cy,t,ch+t,O),Matter.Bodies.rectangle(cx+cw/2+t/2,cy,t,ch+t,O)]
SHAPES.v=(cx,cy,cw,ch,t)=>{const h=cw/2,l=Math.sqrt(h*h+ch*ch)+t,a=Math.atan2(ch,h);return[Matter.Bodies.rectangle(cx-h/2,cy,l,t,{...O,angle:a}),Matter.Bodies.rectangle(cx+h/2,cy,l,t,{...O,angle:-a})]}
SHAPES.bowl=(cx,cy,cw,ch,t)=>{const r=[],n=12,d=ch*0.35;for(let i=0;i<n;i++){const f=(i/(n-1))*2-1,x=cx+f*cw/2,yOff=d*(1-f*f),y=cy+ch/2-yOff+d*0.3,s=-2*d*f/(cw/2);r.push(Matter.Bodies.rectangle(x,y-t/2,cw/n*1.2+t,t,{...O,angle:Math.atan(s)}))}r.push(Matter.Bodies.rectangle(cx-cw/2-t/2,cy,t,ch*0.7+t,O),Matter.Bodies.rectangle(cx+cw/2+t/2,cy,t,ch*0.7+t,O));return r}
SHAPES.split=(cx,cy,cw,ch,t)=>{const g=Math.max(20,cw*0.08),h=(cw-g)/2;return[Matter.Bodies.rectangle(cx-h/2-g/2,cy+ch/2,h+t*2,t,O),Matter.Bodies.rectangle(cx-h-g/2-t/2,cy,t,ch+t,O),Matter.Bodies.rectangle(cx-g/2-t/2,cy,t,ch+t,O),Matter.Bodies.rectangle(cx+h/2+g/2,cy+ch/2,h+t*2,t,O),Matter.Bodies.rectangle(cx+g/2+t/2,cy,t,ch+t,O),Matter.Bodies.rectangle(cx+h+g/2+t/2,cy,t,ch+t,O)]}
SHAPES.funnel=(cx,cy,cw,ch,t)=>{const n=Math.max(30,cw*0.2),wh=ch*0.6,wty=cy-ch/2,lX=cx-cw/2,lE=cx-n/2,lL=Math.sqrt((lE-lX)**2+wh**2)+t,rX=cx+cw/2,rE=cx+n/2,rL=Math.sqrt((rE-rX)**2+wh**2)+t;return[Matter.Bodies.rectangle((lX+lE)/2,wty+wh/2,lL,t,{...O,angle:Math.atan2(wh,lE-lX)}),Matter.Bodies.rectangle((rX+rE)/2,wty+wh/2,rL,t,{...O,angle:Math.atan2(wh,rE-rX)}),Matter.Bodies.rectangle(cx,wty+wh+t/2,n+t*2,t,O)]}
SHAPES.heart=(cx,cy,cw,ch,t)=>{const n=28,s=Math.min(cw,ch*1.1)/18,p=[];for(let i=0;i<n;i++){const th=(i/n)*Math.PI*2+0.4,hx=16*Math.pow(Math.sin(th),3)*s,hy=(13*Math.cos(th)-5*Math.cos(2*th)-2*Math.cos(3*th)-Math.cos(4*th))*s;if(hy>-ch*0.15)p.push({x:cx+hx,y:cy-hy+ch*0.05})}return perimW(p,t,O)}
SHAPES.star=(cx,cy,cw,ch,t)=>{const p=5,o=Math.min(cw,ch)/2,i=o*0.4,pm=[];for(let j=0;j<p*2-2;j++){const a=-Math.PI/2-Math.PI/p*0.6+j*Math.PI/p;pm.push({x:cx+(j%2===0?o:i)*Math.cos(a),y:cy+(j%2===0?o:i)*Math.sin(a)})}return perimW(pm,t,O)}
SHAPES.cage=(cx,cy,cw,ch,t)=>{const r=[Matter.Bodies.rectangle(cx,cy+ch/2,cw+t*2,t,O),Matter.Bodies.rectangle(cx-cw/2-t/2,cy,t,ch+t,O),Matter.Bodies.rectangle(cx+cw/2+t/2,cy,t,ch+t,O)];for(let i=1;i<=6;i++)r.push(Matter.Bodies.rectangle(cx-cw/2+i*cw/7,cy-ch/2,t*0.5,ch*0.35,O));return r}
SHAPES.stairs=(cx,cy,cw,ch,t)=>{const r=[],s=5,sw=cw/s,sh=ch/s*0.7;for(let i=0;i<s;i++){const sx=cx-cw/2+i*sw+sw/2,sy=cy+ch/2-i*sh;r.push(Matter.Bodies.rectangle(sx,sy,sw+t,t,O),Matter.Bodies.rectangle(sx,sy-sh/2-t/2,t,sh+t,O))}r.push(Matter.Bodies.rectangle(cx+cw/2+t/2,cy,t,ch+t,O));return r}
SHAPES.zigzag=(cx,cy,cw,ch,t)=>{const r=[],n=5,sh=ch/n*0.65,ins=cw*0.25;for(let i=0;i<n;i++){const yy=cy+ch/2-sh*0.5-i*sh,g=i%2===0;r.push(Matter.Bodies.rectangle(cx-cw/2+(g?0:ins)+(cw-ins)/2,yy,cw-ins+t,t,O));if(i>0){const py=cy+ch/2-sh*0.5-(i-1)*sh;r.push(Matter.Bodies.rectangle(cx-cw/2+(g?0:ins)+t/2,(yy+py)/2,t,sh+t,O))}}r.push(Matter.Bodies.rectangle(cx-cw/2-t/2,cy,t,ch+t,O),Matter.Bodies.rectangle(cx+cw/2+t/2,cy,t,ch+t,O));return r}

// --- Canvas ---
function resize(){dpr=window.devicePixelRatio||1;W=window.innerWidth;H=window.innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';if(currentShape!=='draw')buildContainer()}
function buildContainer(){walls.forEach(w=>Matter.Composite.remove(world,w));walls=[];const cw=Math.min(W*0.82,420),ch=Math.min(H*0.28,160),t=16,cx=W/2,cy=H-ch/2-64;if(SHAPES[currentShape])walls=SHAPES[currentShape](cx,cy,cw,ch,t);else walls=SHAPES.box(cx,cy,cw,ch,t);Matter.Composite.add(world,walls)}

// --- Draw ---
function getPos(e){const r=canvas.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}
function samplePts(p,md){const r=[p[0]];for(let i=1;i<p.length;i++){const l=r[r.length-1];if(Math.sqrt((p[i].x-l.x)**2+(p[i].y-l.y)**2)>=md)r.push(p[i])}return r}
function onPD(e){if(currentShape!=='draw'||isPaused)return;isDrawing=true;drawPoints=[getPos(e)];canvas.setPointerCapture(e.pointerId)}
function onPM(e){if(!isDrawing)return;drawPoints.push(getPos(e))}
function onPU(){if(!isDrawing)return;isDrawing=false;if(drawPoints.length<5){drawPoints=[];return}
  walls.forEach(w=>Matter.Composite.remove(world,w));walls=[]
  const s=samplePts(drawPoints,20),tw=16
  for(let i=0;i<s.length-1;i++){const p1=s[i],p2=s[i+1];walls.push(Matter.Bodies.rectangle((p1.x+p2.x)/2,(p1.y+p2.y)/2,Math.sqrt((p2.x-p1.x)**2+(p2.y-p1.y)**2)+tw,tw,O))}
  Matter.Composite.add(world,walls)
}
canvas.addEventListener('pointerdown',onPD);canvas.addEventListener('pointermove',onPM);canvas.addEventListener('pointerup',onPU);canvas.addEventListener('pointerleave',onPU)

// --- Tap ripple ---
canvas.addEventListener('pointerdown',e=>{if(currentShape==='draw'||isPaused)return;const p=getPos(e);ripple={x:p.x,y:p.y,strength:0.012,frame:0}})

// --- Spawning ---
let moodOverrides=null
function getMood(){return MOODS[currentMood]}
function spawn(){const cfg=PARTICLE_CFG[mode];if(!cfg||particles.length>=cfg.max)return
  const sx=W/2+(Math.random()-0.5)*50,[rMin,rMax]=cfg.r,r=rMin+Math.random()*(rMax-rMin)
  const body=Matter.Bodies.circle(sx,-r,r,{...cfg.phys,label:'p'})
  let data={type:mode,r}
  const m=getMood()
  if(mode==='water'){const h=m.hue[0]+Math.random()*(m.hue[1]-m.hue[0]);data={...data,hue:h,sat:m.sat[0]+Math.random()*(m.sat[1]-m.sat[0]),lit:m.lit[0]+Math.random()*(m.lit[1]-m.lit[0])}}
  else if(mode==='animals')data.emoji=EMOS_ANIMALS[Math.floor(Math.random()*EMOS_ANIMALS.length)]
  else if(mode==='faces')data.emoji=EMOS_FACES[Math.floor(Math.random()*EMOS_FACES.length)]
  else if(mode==='hearts')data.emoji=EMOS_HEARTS[Math.floor(Math.random()*EMOS_HEARTS.length)]
  else if(mode==='snow'){data.isBig=r>5;if(!data.isBig){data.hue=m.hue[0];data.sat=m.sat[0];data.lit=m.lit[0]}}
  else if(mode==='candy'){const ci=Math.floor(Math.random()*CANDY_COLORS.length);data.color=CANDY_COLORS[ci];data.stripe=CANDY_STRIPES[ci]}
  else if(mode==='bubbles'){const h=m.hue[0]+Math.random()*(m.hue[1]-m.hue[0]);data.color=`hsla(${h},${m.sat[0]}%,${m.lit[0]}%,0.35)`}
  else if(mode==='stars')data.emoji=EMOS_STARS[Math.floor(Math.random()*EMOS_STARS.length)]
  Matter.Composite.add(world,body);particles.push({body,...data})
}
function updateSpawning(){const c=PARTICLE_CFG[mode];if(!c)return;spawnCounter++;if(spawnCounter%c.rate===0)for(let i=0;i<c.batch;i++)spawn()}
function cleanup(){for(let i=particles.length-1;i>=0;i--){const p=particles[i],pos=p.body.position;if(pos.y>H+120||pos.x<-120||pos.x>W+120||pos.y<-200){Matter.Composite.remove(world,p.body);particles.splice(i,1)}}}

// --- Breath ---
async function toggleMic(){
  if(micActive){if(micStream)micStream.getTracks().forEach(t=>t.stop());if(audioCtx)audioCtx.close();micActive=false;micBtn.classList.remove('active');return}
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:true})
    audioCtx=new(window.AudioContext||window.webkitAudioContext)()
    const src=audioCtx.createMediaStreamSource(micStream)
    analyser=audioCtx.createAnalyser();analyser.fftSize=256
    src.connect(analyser);micActive=true;micBtn.classList.add('active')
  }catch(e){console.warn('Mic:',e)}
}
function updateBreath(){if(!micActive||!analyser){breathLevel=0;return}
  const d=new Uint8Array(analyser.frequencyBinCount);analyser.getByteTimeDomainData(d)
  let s=0;for(let i=0;i<d.length;i++)s+=Math.abs(d[i]-128);breathLevel=s/d.length/128
}
micBtn.addEventListener('click',toggleMic)

// --- Mood ---
moodBtn.addEventListener('click',()=>{const vis=moodPicker.style.display;moodPicker.style.display=vis==='flex'?'none':'flex'})
function setMood(m){currentMood=m;moodBtns.forEach(b=>b.classList.toggle('active',b.dataset.mood===m))}
moodBtns.forEach(b=>b.addEventListener('click',()=>setMood(b.dataset.mood)))

// --- Feedback ---
feedbackBtn.addEventListener('click',()=>{fbOverlay.style.display='flex';fbText.value='';fbThanks.style.display='none';fbSubmit.disabled=true;wordCount.textContent='0 / 100 words'})
fbCancel.addEventListener('click',()=>fbOverlay.style.display='none')
fbText.addEventListener('input',()=>{
  const t=fbText.value.trim(),words=t?t.split(/\s+/).length:0
  if(words>100){fbText.value=t.split(/\s+/).slice(0,100).join(' ');wordCount.textContent='100 / 100 words';fbSubmit.disabled=false;return}
  wordCount.textContent=`${words} / 100 words`;fbSubmit.disabled=words===0
})
fbSubmit.addEventListener('click',()=>{
  const t=fbText.value.trim();if(!t)return
  const fb=JSON.parse(localStorage.getItem('fb')||'[]')
  fb.push({text:t,user:piUser?.username||'anon',ts:Date.now()})
  localStorage.setItem('fb',JSON.stringify(fb))
  fbText.style.display='none';document.querySelector('.fb-foot').style.display='none';fbThanks.style.display='block'
  setTimeout(()=>{fbOverlay.style.display='none';fbText.style.display='';document.querySelector('.fb-foot').style.display='';fbThanks.style.display='none'},1500)
})

// --- Render ---
function render(){
  ctx.setTransform(dpr,0,0,dpr,0,0)
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H)
  
  // Procedural sky — hue shifts with average particle Y
  let skyHue=195
  if(particles.length>5){let sy=0;for(const p of particles)sy+=p.body.position.y;const r=sy/particles.length/H;skyHue+=r*30}
  const bg=`hsla(${skyHue},50%,10%,0.04)`
  const gr=ctx.createRadialGradient(W/2,H*0.3,0,W/2,H*0.3,H*0.7)
  gr.addColorStop(0,bg);gr.addColorStop(1,'rgba(0,0,0,0)')
  ctx.fillStyle=gr;ctx.fillRect(0,0,W,H)

  // Walls
  ctx.shadowColor='rgba(79,195,247,0.12)';ctx.shadowBlur=10;ctx.lineWidth=1.5
  for(let i=0;i<walls.length;i++){const v=walls[i].vertices;ctx.beginPath();ctx.moveTo(v[0].x,v[0].y);for(let j=1;j<v.length;j++)ctx.lineTo(v[j].x,v[j].y);ctx.closePath();ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.stroke()}
  ctx.shadowBlur=0

  // Draw preview
  if(currentShape==='draw'&&drawPoints.length>0){
    ctx.beginPath();ctx.moveTo(drawPoints[0].x,drawPoints[0].y);for(let i=1;i<drawPoints.length;i++)ctx.lineTo(drawPoints[i].x,drawPoints[i].y)
    ctx.strokeStyle=isDrawing?'rgba(79,195,247,0.85)':'rgba(255,179,71,0.5)';ctx.lineWidth=isDrawing?5:3;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke()
    if(!isDrawing&&drawPoints.length>0){ctx.fillStyle='rgba(255,179,71,0.1)';for(let i=0;i<walls.length;i++){const c=walls[i].position;ctx.beginPath();ctx.arc(c.x,c.y,6,0,Math.PI*2);ctx.fill()}}
  }
  if(currentShape==='draw'&&drawPoints.length===0&&walls.length===0){
    ctx.fillStyle='rgba(255,179,71,0.25)';ctx.font='14px -apple-system, sans-serif';ctx.textAlign='center';ctx.textBaseline='middle'
    ctx.fillText('Draw your container shape on the screen',W/2,H/2)
  }

  // Particles
  for(let i=0;i<particles.length;i++){
    const p=particles[i],pos=p.body.position
    if(pos.x<-50||pos.x>W+50||pos.y<-50||pos.y>H+50)continue
    const rot=p.body.angle
    if(p.type==='water'){
      ctx.beginPath();ctx.arc(pos.x,pos.y,p.r,0,Math.PI*2);ctx.fillStyle=`hsla(${p.hue},${p.sat}%,${p.lit}%,0.85)`;ctx.fill()
      ctx.beginPath();ctx.arc(pos.x-p.r*0.25,pos.y-p.r*0.25,p.r*0.3,0,Math.PI*2);ctx.fillStyle=`hsla(${p.hue},${p.sat+10}%,${p.lit+20}%,0.3)`;ctx.fill()
    }else if(p.type==='snow'){
      if(p.isBig){ctx.save();ctx.translate(pos.x,pos.y);ctx.font=`${p.r*2.4}px "Apple Color Emoji","Segoe UI Emoji",sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('❄️',0,0);ctx.restore()}
      else{ctx.beginPath();ctx.arc(pos.x,pos.y,p.r,0,Math.PI*2);ctx.fillStyle=`hsla(${p.hue},${p.sat}%,${p.lit}%,0.85)`;ctx.fill();ctx.beginPath();ctx.arc(pos.x,pos.y,p.r*0.4,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fill()}
    }else if(p.type==='candy'){
      ctx.save();ctx.translate(pos.x,pos.y);ctx.rotate(rot)
      ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill()
      ctx.beginPath();ctx.ellipse(0,0,p.r*0.25,p.r*0.7,rot,0,Math.PI*2);ctx.fillStyle=p.stripe;ctx.fill()
      ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;ctx.stroke()
      ctx.restore()
    }else if(p.type==='bubbles'){
      ctx.beginPath();ctx.arc(pos.x,pos.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill()
      ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1;ctx.stroke()
      ctx.beginPath();ctx.arc(pos.x-p.r*0.2,pos.y-p.r*0.2,p.r*0.35,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.35)';ctx.fill()
    }else{
      ctx.save();ctx.translate(pos.x,pos.y);ctx.rotate(rot)
      ctx.font=`${p.r*2}px "Apple Color Emoji","Segoe UI Emoji",sans-serif`
      ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.emoji,0,0);ctx.restore()
    }
  }

  // Paused overlay
  if(isPaused){ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(0,0,W,H);ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='28px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('⏸',W/2,H/2)}

  ctx.fillStyle='rgba(255,255,255,0.12)';ctx.font='9px -apple-system, sans-serif';ctx.textAlign='center';ctx.textBaseline='bottom'
  ctx.fillText(`g(${engine.gravity.x.toFixed(1)},${engine.gravity.y.toFixed(1)})${micActive?' 🎤':''}`,W/2,H-3)
}

// --- Loop ---
function loop(){
  if(!isPaused){
    Matter.Engine.update(engine,1000/60)
    updateBreath()
    // Breath wind
    if(micActive&&breathLevel>0.04){const f=breathLevel*0.006;for(const p of particles)Matter.Body.applyForce(p.body,p.body.position,{x:(Math.random()-0.5)*f*0.4,y:-f})}
    // Tap ripple
    if(ripple){for(const p of particles){const dx=p.body.position.x-ripple.x,dy=p.body.position.y-ripple.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<90&&dist>0){const f=ripple.strength*(1-dist/90);Matter.Body.applyForce(p.body,p.body.position,{x:dx/dist*f,y:dy/dist*f})}}ripple.frame++;if(ripple.frame>15)ripple=null}
    updateSpawning();cleanup()
  }
  render()
  requestAnimationFrame(loop)
}

// --- Pause / Speed ---
pauseBtn.addEventListener('click',()=>{isPaused=!isPaused;pauseBtn.textContent=isPaused?'▶':'⏸';pauseBtn.classList.toggle('paused',isPaused)})
speedSlider.addEventListener('input',()=>{speedMul=parseFloat(speedSlider.value);engine.gravity.scale=0.001*speedMul;speedVal.textContent=speedMul.toFixed(1)+'×'})

// --- Orientation ---
function onOrientation(e){if(e.gamma==null&&e.beta==null)return;engine.gravity.x=Math.max(-3,Math.min(3,(e.gamma||0)/45));engine.gravity.y=Math.max(0.1,Math.min(4,(e.beta||90)/55))}
function initOrientation(){const d=typeof DeviceOrientationEvent;if(d==='undefined')return;if(typeof DeviceOrientationEvent.requestPermission==='function'){permOverlay.style.display='flex';permBtn.onclick=async()=>{try{const r=await DeviceOrientationEvent.requestPermission();if(r==='granted'){window.addEventListener('deviceorientation',onOrientation);permOverlay.style.display='none'}}catch(_){}}}else{window.addEventListener('deviceorientation',onOrientation)}}

// --- Keys ---
const KG={ArrowLeft:[-1.2,0],ArrowRight:[1.2,0],ArrowUp:[0,0.3],ArrowDown:[0,2.2]}
addEventListener('keydown',e=>{const g=KG[e.key];if(g){engine.gravity.x=g[0];engine.gravity.y=g[1]}})
addEventListener('keyup',e=>{if(e.key.startsWith('Arrow')){engine.gravity.x=0;engine.gravity.y=1}})

// --- Mode / Shape ---
function setMode(m){if(m===mode)return;mode=m;particles.forEach(p=>Matter.Composite.remove(world,p.body));particles=[];modeBtns.forEach(b=>b.classList.toggle('active',b.dataset.mode===m))}
function setShape(s){if(s===currentShape)return;currentShape=s;particles.forEach(p=>Matter.Composite.remove(world,p.body));particles=[];drawPoints=[];shapeBtns.forEach(b=>b.classList.toggle('active',b.dataset.shape===s));if(s==='draw'){walls.forEach(w=>Matter.Composite.remove(world,w));walls=[]}else buildContainer()}
modeBtns.forEach(b=>b.addEventListener('click',()=>setMode(b.dataset.mode)))
shapeBtns.forEach(b=>b.addEventListener('click',()=>setShape(b.dataset.shape)))
addEventListener('resize',resize)

// --- Boot ---
if(typeof Matter==='undefined'){loading.textContent='Failed to load Matter.js.';return}
loading.style.display='none'
resize();initOrientation();initPi();loop()
})()
</script>
